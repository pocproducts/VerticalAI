# OpenSpec configuration — fiscal-agent
schema: spec-driven

project: fiscal-agent
version: 2.0.0

context: |
  Tech stack (backend): Python 3.11+, FastAPI, Pydantic v2, Typer (CLI), FastMCP (MCP server), Composio (browser automation)
  Tech stack (frontend): Next.js 16, React 19, TypeScript, Tailwind CSS 4, shadcn/ui (Radix UI), Three.js, Recharts
  Architecture:
    - Backend: Modular monolith — CLI pipeline (Typer), REST API (FastAPI), MCP server (FastMCP), browser automation layer (Composio), Engram semantic memory
    - Frontend (3 proyectos Next.js):
      1. Landing Page (IdeaLandingPage_optimus-the-ai-platform-to-bu) — sitio institucional con pricing, features, testimonios, navegación multi-idioma
      2. System Dashboard (IdeaDashboardControlSistema_v0) — monitoreo de infraestructura, métricas, activity feed, health checks
      3. Chatbot UI (IdeaDashboardai-chatbot-interface-template) — interfaz de chat fiscal conectada a backend via POST /v1/chat/message
  Entry points: CLI (python -m fiscal_agent), REST API (FastAPI :8000), MCP server (FastMCP :7438), Frontends (Next.js :3000 c/u)
  Testing: pytest desde consola/CLI (no UI tests), tests en fiscal_agent/tests/ (unit + API tests), sin coverage tool detectado
  Style: Ruff (single quotes, tab indentation, 130 line-length), Google-style docstrings, `from __future__ import annotations`, Pydantic v2 models for all data contracts
  Build: Hatchling (backend), uv.lock presente; pnpm (frontends)

strict_tdd: false
strict_tdd_note: "Cannot verify test runner without shell access — tests/ dir exists but no pytest config found in pyproject.toml"

testing:
  runner:
    framework: pytest
    command: python -m pytest
    verified: false
  layers:
    unit:
      available: true
      tool: pytest
    integration:
      available: false
      tool: null
    e2e:
      available: false
      tool: null
  coverage:
    available: false
    command: null
  quality:
    linter:
      available: true
      tool: Ruff
      command: ruff check
    type_checker:
      available: false
      tool: null
    formatter:
      available: true
      tool: Ruff
      command: ruff format

rules:
  proposal:
    - Include rollback plan for risky changes
    - Define success criteria for each proposal
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Reference existing Pydantic models from fiscal_agent/models.py
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    rules:
      - Follow existing code patterns (Pydantic v2, FastAPI routers, Typer CLI)
      - Use single quotes, tab indentation per project style
    tdd: false
    test_command: ""
  verify:
    test_command: "python -m pytest fiscal_agent/tests/"
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
